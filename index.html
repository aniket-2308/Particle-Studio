<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Particle Studio</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="stage"></div>

<div id="dropzone">
  <p class="eyebrow">Particle Studio</p>
  <h1 class="dz-headline">Drop your 3D Model.<br>Watch it become a constellation.</h1>
  <p class="dz-body">Drag a <strong>.glb</strong> or <strong>.gltf</strong> model anywhere on this canvas. It'll be sampled into ~9,000 particles in the Particle Studio, reactive to your cursor.</p>
  <button class="dz-pill" id="browseBtn">Choose file</button>
  <input type="file" id="fileInput" accept=".glb,.gltf">
  <div id="dzHistoryWrap" hidden>
    <p class="dz-recent">Or pick up where you left off</p>
    <div id="dzHistory"></div>
  </div>
</div>

<div id="panel">
  <div class="panel-header" id="panelHeader">
    <h2>Tune</h2>
    <button class="panel-toggle" id="panelToggle" aria-label="Toggle controls" aria-expanded="false">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
    </button>
  </div>
  <div class="panel-body" id="panelBody">
  <div class="row">
    <label>Particles <span id="countVal">9000</span></label>
    <input type="range" id="countSlider" min="1500" max="15000" step="500" value="9000">
  </div>
  <div class="row">
    <label>Size <span id="sizeVal">1.0</span></label>
    <input type="range" id="sizeSlider" min="0.3" max="3" step="0.1" value="1.0">
  </div>
  <div class="row">
    <label>Center density <span id="densVal">0.6</span></label>
    <input type="range" id="densSlider" min="0" max="0.9" step="0.05" value="0.6">
  </div>
  <div class="row">
    <label>Parallax <span id="paraVal">1.0</span></label>
    <input type="range" id="paraSlider" min="0" max="3" step="0.1" value="1.0">
  </div>
  <div class="row">
    <label>Color mix</label>
    <div class="swatches" id="swatches"></div>
  </div>
  <div class="row">
    <label>Hover effect</label>
    <div class="fx-group" id="fxGroup"></div>
  </div>
  <div class="row" id="intensityRow" hidden>
    <label>Intensity <span id="intensityVal">1.0</span></label>
    <input type="range" id="intensitySlider" min="0.1" max="4" step="0.1" value="1">
  </div>
  <button class="pbtn" id="downloadBtn">
    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12"/><path d="m7 11 5 5 5-5"/><path d="M5 21h14"/></svg>
    Download .glb
  </button>
  <button class="pbtn" id="embedBtn">
    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7 0l3-3a5 5 0 0 0-7-7l-1 1"/><path d="M14 11a5 5 0 0 0-7 0l-3 3a5 5 0 0 0 7 7l1-1"/></svg>
    Copy embed link
  </button>
  <button class="pbtn" id="resetBtn">
    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9 9 0 0 0-6.4 2.6L3 8"/><path d="M3 3v5h5"/></svg>
    Reset to defaults
  </button>
  </div>
</div>

<button class="reload-pill" id="reloadBtn">Load another model</button>

<button class="history-pill" id="historyBtn">History</button>
<div id="historyPanel">
  <h2>Library</h2>
  <div id="historyList"></div>
</div>

<div id="status"></div>

<div id="toast" title="Dismiss"></div>

<div id="colorPop">
  <input type="color" id="popColor" value="#00e5ff">
  <input type="text" id="popHex" maxlength="7" spellcheck="false" placeholder="#rrggbb">
  <div class="pop-actions">
    <button id="popDelete">Delete</button>
    <button id="popSave">Save</button>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.module.min.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
    "@supabase/supabase-js": "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm"
  }
}
</script>

<script type="module" src="js/app.js"></script>
</body>
</html>
