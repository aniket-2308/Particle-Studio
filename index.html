<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SafeIgnite — Particle Constellation</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="stage"></div>

<div id="dropzone">
  <p class="eyebrow">Particle Studio</p>
  <h1 class="dz-headline">Drop your 3D Model.<br>Watch it become a constellation.</h1>
  <p class="dz-body">Drag a <strong>.glb</strong> or <strong>.gltf</strong> model anywhere on this canvas. It'll be sampled into ~4,000 particles in the Particle Studio, reactive to your cursor.</p>
  <button class="dz-pill" id="browseBtn">Choose file</button>
  <input type="file" id="fileInput" accept=".glb,.gltf">
  <div id="dzHistoryWrap" hidden>
    <p class="dz-recent">Or pick up where you left off</p>
    <div id="dzHistory"></div>
  </div>
</div>

<div id="panel">
  <h2>Tune</h2>
  <div class="row">
    <label>Particles <span id="countVal">9000</span></label>
    <input type="range" id="countSlider" min="1500" max="15000" step="500" value="9000">
  </div>
  <div class="row">
    <label>Size <span id="sizeVal">1.0</span></label>
    <input type="range" id="sizeSlider" min="0.3" max="3" step="0.1" value="1.0">
  </div>
  <div class="row">
    <label>Center density <span id="densVal">0.6</span></label>
    <input type="range" id="densSlider" min="0" max="0.9" step="0.05" value="0.6">
  </div>
  <div class="row">
    <label>Parallax <span id="paraVal">1.0</span></label>
    <input type="range" id="paraSlider" min="0" max="3" step="0.1" value="1.0">
  </div>
  <div class="row">
    <label>Generate Accent mix</label>
    <div class="swatches" id="swatches"></div>
  </div>
  <button class="pbtn" id="copyBtn">
    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h10"/></svg>
    Copy particle scene
  </button>
  <button class="pbtn" id="downloadBtn">
    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12"/><path d="m7 11 5 5 5-5"/><path d="M5 21h14"/></svg>
    Download particles .glb
  </button>
</div>

<button class="reload-pill" id="reloadBtn">Load another model</button>

<button class="history-pill" id="historyBtn">History</button>
<div id="historyPanel">
  <h2>Library</h2>
  <div id="historyList"></div>
</div>

<input type="color" id="accentPicker" value="#8052ff">

<div id="status"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.module.min.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
    "@supabase/supabase-js": "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm"
  }
}
</script>

<script type="module" src="js/app.js"></script>
</body>
</html>
